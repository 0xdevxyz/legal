version: '3.8'

networks:
  complyo-network:
    driver: bridge
  proxy-network:
    external: true

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: complyo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-complyo_db}
      POSTGRES_USER: ${POSTGRES_USER:-complyo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - complyo-network
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-complyo_user} -d ${POSTGRES_DB:-complyo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: complyo-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required in .env}
    ports:
      - "127.0.0.1:6380:6379"
    networks:
      - complyo-network
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: complyo-backend
    mem_limit: 1g
    memswap_limit: 1.5g
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-complyo_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-complyo_db}
      - REDIS_HOST=redis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=production
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_WEBHOOK_SECRET_ADDONS=${STRIPE_WEBHOOK_SECRET_ADDONS:-${STRIPE_WEBHOOK_SECRET}}
      - STRIPE_PRICE_PRO_MONTHLY=${STRIPE_PRICE_PRO_MONTHLY}
      - STRIPE_PRICE_PRO_YEARLY=${STRIPE_PRICE_PRO_YEARLY}
      - STRIPE_PRICE_AGENCY_MONTHLY=${STRIPE_PRICE_AGENCY_MONTHLY}
      - STRIPE_PRICE_AGENCY_YEARLY=${STRIPE_PRICE_AGENCY_YEARLY}
      # Neue Pläne: single (19€/Modul), complete (49€), expert (39€/Monat)
      - STRIPE_PRICE_SINGLE_MODULE=${STRIPE_PRICE_SINGLE_MODULE}
      - STRIPE_PRICE_COMPLETE=${STRIPE_PRICE_COMPLETE}
      - STRIPE_PRICE_EXPERT_MONTHLY=${STRIPE_PRICE_EXPERT_MONTHLY}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required in .env}
      - FRONTEND_URL=https://complyo.de
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SENDER_EMAIL=${SENDER_EMAIL:-noreply@complyo.de}
      - SENDER_NAME=${SENDER_NAME:-Complyo Compliance}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - VIRTUAL_HOST=api.complyo.de
      - LETSENCRYPT_HOST=api.complyo.de
      - LETSENCRYPT_EMAIL=admin@complyo.de
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - complyo-network
      - proxy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Landing Page (React/Next.js)
  landing:
    build:
      context: ./landing-react
      dockerfile: Dockerfile.prod
    container_name: complyo-landing
    init: true   # tini als PID 1 -> reapt verwaiste Kindprozesse (Zombie-Schutz)
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.complyo.de
      - VIRTUAL_HOST=complyo.de,www.complyo.de
      - LETSENCRYPT_HOST=complyo.de,www.complyo.de
      - LETSENCRYPT_EMAIL=admin@complyo.de
    networks:
      - complyo-network
      - proxy-network
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Dashboard (React/Next.js)  
  dashboard:
    build:
      context: ./dashboard-react
      dockerfile: Dockerfile.prod
    container_name: complyo-dashboard
    init: true   # tini als PID 1 -> reapt verwaiste ssl_client-Kinder (Zombie-Schutz)
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.complyo.de
      - NEXTAUTH_URL=https://app.complyo.de
      - NEXTAUTH_SECRET=${JWT_SECRET:?JWT_SECRET is required in .env}
      - AUTH_SECRET=${JWT_SECRET}
      - AUTH_URL=https://app.complyo.de
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_BACKEND_URL=https://api.complyo.de
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
      - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}
      - VIRTUAL_HOST=app.complyo.de
      - LETSENCRYPT_HOST=app.complyo.de
      - LETSENCRYPT_EMAIL=admin@complyo.de
    networks:
      - complyo-network
      - proxy-network
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      # /login liefert 200 ohne Redirect -> kein wget->HTTPS->ssl_client (Zombie-Quelle)
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Admin Panel
  admin:
    image: nginx:alpine
    container_name: complyo-admin
    ports:
      - "127.0.0.1:3004:80"
    volumes:
      - ./simple-admin:/usr/share/nginx/html:ro
    networks:
      - complyo-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: complyo-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - complyo-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: complyo-grafana
    ports:
      - "127.0.0.1:3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/01_overview.json
    networks:
      - complyo-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
