name: 🔍 CI - Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ==========================================
  # Backend Tests
  # ==========================================
  backend-lint:
    name: 🐍 Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "./backend/requirements.txt"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: 🔍 Run Ruff (Linter)
        run: ruff check . --output-format=github || true

      - name: 📝 Run Ruff (Formatter Check)
        run: ruff format --check . || true

  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "./backend/requirements.txt"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: 🧪 Run Tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret-for-ci-only-not-for-production
          ENVIRONMENT: test
        run: |
          pytest tests/ -v --cov=. --cov-report=xml || true

      - name: 📊 Upload Coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  # ==========================================
  # Frontend Tests (Dashboard)
  # ==========================================
  dashboard-lint:
    name: 📊 Dashboard Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dashboard-react

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./dashboard-react/package-lock.json"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint || true

      - name: 📝 Type Check
        run: npm run type-check || true

  dashboard-build:
    name: 🏗️ Dashboard Build
    runs-on: ubuntu-latest
    needs: dashboard-lint
    defaults:
      run:
        working-directory: ./dashboard-react

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./dashboard-react/package-lock.json"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.complyo.tech

  # ==========================================
  # Frontend Tests (Landing)
  # ==========================================
  landing-lint:
    name: 🎯 Landing Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing-react

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./landing-react/package-lock.json"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint || true

  landing-build:
    name: 🏗️ Landing Build
    runs-on: ubuntu-latest
    needs: landing-lint
    defaults:
      run:
        working-directory: ./landing-react

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./landing-react/package-lock.json"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.complyo.tech

  # ==========================================
  # Docker Build Test
  # ==========================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, dashboard-build, landing-build]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: complyo-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build Dashboard Image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard-react
          file: ./dashboard-react/Dockerfile.prod
          push: false
          tags: complyo-dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build Landing Image
        uses: docker/build-push-action@v5
        with:
          context: ./landing-react
          file: ./landing-react/Dockerfile.prod
          push: false
          tags: complyo-landing:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Dependency Vulnerability Audit
  # ==========================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "./backend/requirements.txt"

      - name: Python — pip-audit
        working-directory: ./backend
        run: |
          pip install --upgrade pip pip-audit
          pip install -r requirements.txt
          pip-audit --requirement requirements.txt --format markdown --output /tmp/pip-audit.md || true
          cat /tmp/pip-audit.md

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: /tmp/pip-audit.md
          retention-days: 30

      - name: Node.js — npm audit (dashboard)
        working-directory: ./dashboard-react
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high --json > /tmp/npm-audit-dashboard.json || true

      - name: Node.js — npm audit (landing)
        working-directory: ./landing-react
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high --json > /tmp/npm-audit-landing.json || true

      - name: Upload npm audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: /tmp/npm-audit-*.json
          retention-days: 30

  # ==========================================
  # Security Scan
  # ==========================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: 📤 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
