global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "complyo-backend"
    static_configs:
      - targets: ["backend:8002"]
    metrics_path: "/metrics"
    authorization:
      credentials_file: /etc/prometheus/metrics_token
    scrape_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
