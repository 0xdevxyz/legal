# First-Party Proxy: static.complyo.de
# Serves widget assets under /assets/ to bypass adblocker detection
# ADR-005: Widget Domain-Fix + First-Party-Proxy

server {
    listen 80;
    server_name static.complyo.de;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name static.complyo.de;

    ssl_certificate /etc/letsencrypt/live/static.complyo.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/static.complyo.de/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Cache-Control "public, max-age=3600" always;

    # First-Party Proxy: /assets/a.js → accessibility widget
    location = /assets/a.js {
        proxy_pass http://complyo_backend/widgets/accessibility-v6.js;
        proxy_set_header Host api.complyo.de;
        proxy_cache_valid 200 1h;
    }

    # First-Party Proxy: /assets/c.js → cookie banner v2
    location = /assets/c.js {
        proxy_pass http://complyo_backend/widgets/cookie_banner_v2.js;
        proxy_set_header Host api.complyo.de;
        proxy_cache_valid 200 1h;
    }

    # First-Party Proxy: /assets/o.js → optout center
    location = /assets/o.js {
        proxy_pass http://complyo_backend/widgets/optout-center.js;
        proxy_set_header Host api.complyo.de;
        proxy_cache_valid 200 1h;
    }

    # Backward Compat: alte /widget/* Pfade → neue Widget-Endpoints
    location ~ ^/widget/(.+)$ {
        return 301 https://api.complyo.de/widgets/$1$is_args$args;
    }

    location / {
        return 404;
    }
}
